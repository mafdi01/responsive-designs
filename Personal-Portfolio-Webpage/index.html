  <link rel="stylesheet" href="./styles.css">

  <!-- Google Fonts: preconnect + rel="preload" as="style" approach.
       WHY preload instead of media="print":
         - rel="preload" has the HIGHEST browser fetch priority and is discovered
           immediately during HTML parsing — before any CSS is parsed.
         - media="print" is discovered later and has lower priority, which
           worsened LCP when the LCP element is text using a custom font.
         - Both approaches are non-render-blocking; preload is strictly faster
           for fonts because it moves fetch earlier in the waterfall.
       WHY Chakra Petch weights were narrowed:
         - Original request: 7 weights × 2 styles = up to 14 woff2 files.
         - Page actually uses: italic 400 (.small-display, h3) and italic 700 (h3 bold).
         - Noto Serif variants are kept as variable-font ranges (wdth axis requires it). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@1,400;1,700&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@1,400;1,700&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- Font Awesome: brands-only subset (was all.min.css = 135 KB, brands.min.css = ~19 KB).
       The page only uses fa-brands icons so the solid/regular/etc. icon sets are unused CSS.
       Also loaded async to remove render-blocking. -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/brands.min.css"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/brands.min.css">
  </noscript>
  <!-- fontawesome.min.css must be loaded alongside any icon subset to provide shared base styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/fontawesome.min.css">
  </noscript>
</head>
